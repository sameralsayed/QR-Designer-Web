<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create beautiful custom QR codes for free. Add logos, change colors, shapes, backgrounds, and more. Fully responsive QR Designer web app.">
    <meta name="keywords" content="QR code generator, custom QR code, free QR designer, QR code with logo, stylish QR codes">
    <title>QR Designer - Beautiful QR Codes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">QR Designer</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#generator">Generator</a></li>
                    <li class="nav-item"><a class="nav-link" href="#examples">Examples</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="bg-gradient text-white py-5 text-center">
        <div class="container">
            <h1 class="display-4 fw-bold">Design Beautiful QR Codes</h1>
            <p class="lead">Free • No Ads • Unlimited Customization</p>
            <a href="#generator" class="btn btn-light btn-lg mt-3">Start Creating Now</a>
        </div>
    </header>

    <section id="generator" class="py-5">
        <div class="container">
            <div class="row">
                <!-- Left: Controls -->
                <div class="col-lg-5">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h3 class="card-title">Create Your QR Code</h3>
                            
                            <!-- Content Type -->
                            <div class="mb-3">
                                <label class="form-label">Content Type</label>
                                <select id="contentType" class="form-select">
                                    <option value="text">Text</option>
                                    <option value="url" selected>URL / Link</option>
                                    <option value="wifi">Wi-Fi</option>
                                </select>
                            </div>

                            <!-- Content Input -->
                            <div id="contentInput">
                                <label class="form-label" id="contentLabel">URL or Text</label>
                                <input type="text" id="qrContent" class="form-control" placeholder="https://example.com" value="https://example.com">
                            </div>

                            <!-- Wi-Fi fields (hidden by default) -->
                            <div id="wifiFields" class="d-none">
                                <div class="mb-2">
                                    <input type="text" id="wifiSSID" class="form-control" placeholder="Network Name (SSID)">
                                </div>
                                <div class="mb-2">
                                    <input type="password" id="wifiPassword" class="form-control" placeholder="Password">
                                </div>
                                <select id="wifiEncryption" class="form-select">
                                    <option value="WPA">WPA/WPA2</option>
                                    <option value="WEP">WEP</option>
                                    <option value="nopass">No Password</option>
                                </select>
                            </div>

                            <!-- Customization -->
                            <hr>
                            <h5>Design</h5>
                            
                            <div class="row g-3">
                                <div class="col-6">
                                    <label class="form-label">Foreground Color</label>
                                    <input type="color" id="fgColor" value="#000000" class="form-control form-control-color w-100">
                                </div>
                                <div class="col-6">
                                    <label class="form-label">Background Color</label>
                                    <input type="color" id="bgColor" value="#FFFFFF" class="form-control form-control-color w-100">
                                </div>
                            </div>

                            <div class="mb-3 mt-3">
                                <label class="form-label">Error Correction Level</label>
                                <select id="errorLevel" class="form-select">
                                    <option value="L">Low (L)</option>
                                    <option value="M" selected>Medium (M)</option>
                                    <option value="Q">Quartile (Q)</option>
                                    <option value="H">High (H)</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Add Logo (URL)</label>
                                <input type="text" id="logoUrl" class="form-control" placeholder="https://example.com/logo.png">
                            </div>

                            <button id="generateBtn" class="btn btn-primary w-100 py-3 fw-bold">
                                <i class="fas fa-qrcode"></i> Generate QR Code
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Right: Preview -->
                <div class="col-lg-7">
                    <div class="card shadow-sm h-100">
                        <div class="card-body text-center">
                            <h4 class="mb-4">Your QR Code Preview</h4>
                            <div id="qrcode" class="mx-auto mb-4" style="max-width: 350px;"></div>
                            
                            <div class="d-flex justify-content-center gap-3">
                                <button id="downloadPNG" class="btn btn-success">
                                    <i class="fas fa-download"></i> Download PNG
                                </button>
                                <button id="downloadSVG" class="btn btn-outline-primary">
                                    <i class="fas fa-download"></i> Download SVG
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-dark text-white py-5">
        <div class="container text-center">
            <p class="mb-1">Made with ❤️ by <a href="https://bio.link/samer" target="_blank" class="text-white fw-bold">SAMER SAEID</a></p>
            <p>Copyright SAMER SAEID © 2026</p>
            <p class="text-muted small">Fully responsive • SEO optimized • Free to use</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
